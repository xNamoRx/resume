<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 32 32" width="32" height="32">
  <defs>
    <linearGradient id="g" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#7b6fff"/>
      <stop offset="100%" stop-color="#22d3ee"/>
    </linearGradient>
    <linearGradient id="g2" x1="100%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#7b6fff"/>
      <stop offset="100%" stop-color="#22d3ee"/>
    </linearGradient>
  </defs>
  <!-- Dark background -->
  <rect width="32" height="32" rx="8" fill="#0b0b13"/>
  <!-- Connection lines -->
  <line x1="16" y1="16" x2="7" y2="8"  stroke="url(#g)"  stroke-width="1.2" opacity="0.6"/>
  <line x1="16" y1="16" x2="25" y2="8"  stroke="url(#g2)" stroke-width="1.2" opacity="0.6"/>
  <line x1="16" y1="16" x2="7" y2="24"  stroke="url(#g2)" stroke-width="1.2" opacity="0.6"/>
  <line x1="16" y1="16" x2="25" y2="24" stroke="url(#g)"  stroke-width="1.2" opacity="0.6"/>
  <line x1="16" y1="16" x2="16" y2="6"  stroke="url(#g)"  stroke-width="1.2" opacity="0.5"/>
  <line x1="16" y1="16" x2="16" y2="26" stroke="url(#g)"  stroke-width="1.2" opacity="0.5"/>
  <!-- Outer nodes -->
  <circle cx="7"  cy="8"  r="2" fill="url(#g)"  opacity="0.75"/>
  <circle cx="25" cy="8"  r="2" fill="url(#g2)" opacity="0.75"/>
  <circle cx="7"  cy="24" r="2" fill="url(#g2)" opacity="0.75"/>
  <circle cx="25" cy="24" r="2" fill="url(#g)"  opacity="0.75"/>
  <circle cx="16" cy="6"  r="1.5" fill="url(#g)" opacity="0.6"/>
  <circle cx="16" cy="26" r="1.5" fill="url(#g)" opacity="0.6"/>
  <!-- Center node (bright) -->
  <circle cx="16" cy="16" r="4" fill="url(#g)"/>
  <circle cx="16" cy="16" r="2" fill="white" opacity="0.9"/>
</svg>
